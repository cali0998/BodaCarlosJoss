<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Carlos & Joselyn</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c59d5f; --wine: #4a0a16; --jade: #0a2e24; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--jade); color: white; text-align: center; }

        section { min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* PORTADA SEGURA */
        .hero { 
            background: linear-gradient(rgba(10,46,36,0.5), rgba(74,10,22,0.6)), url('Foto10.jpg');
            background-size: cover; background-position: center;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); margin: 15px 0; }
        h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); margin-bottom: 10px; }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid var(--gold); border-radius: 20px;
            padding: 30px 20px; width: 100%; max-width: 400px;
        }

        /* CARRETE QUE NO FALLA (Scroll Nativo) */
        .carrete-wrap { width: 100%; max-width: 320px; overflow: hidden; border-radius: 15px; border: 2px solid var(--gold); margin: 20px 0; }
        .carrete { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .carrete::-webkit-scrollbar { display: none; }
        .carrete img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: cover; aspect-ratio: 4/5; }

        .btn {
            background: var(--gold); color: white; padding: 15px 25px; border-radius: 50px;
            text-decoration: none; font-weight: 600; display: inline-block; margin-top: 20px;
            text-transform: uppercase; font-size: 13px; width: 250px;
        }

        .qr-box { background: white; padding: 10px; border-radius: 10px; margin-top: 15px; display: inline-block; }
        .qr-box img { width: 150px; display: block; }
    </style>
</head>
<body>

    <section class="hero">
        <p style="letter-spacing: 3px; text-transform: uppercase;">Nuestra Boda</p>
        <h1>Carlos &<br>Joselyn</h1>
        <p>19 • Diciembre • 2026</p>
    </section>

    <section style="background: linear-gradient(var(--jade), var(--wine));">
        <div class="card">
            <h2>Pase Especial</h2>
            <p>Invitado: <b>[Nombre]</b></p>
            <p>Pases: <b>2</b></p>
            <hr style="border: 0; border-top: 1px solid var(--gold); margin: 15px 0;">
            <p><b>Lugar:</b> Salón Luna Azul, La Rita</p>
            <a href="https://waze.com/ul?ll=10.27941,-83.78455&navigate=yes" class="btn">Cómo llegar 🚗</a>
        </div>
    </section>

    <section>
        <h2>Nosotros</h2>
        <p>Desliza para ver las fotos →</p>
        <div class="carrete-wrap">
            <div class="carrete">
                <img src="Foto1.jpg">
                <img src="Foto2.jpg">
                <img src="Foto3.jpg">
                <img src="Foto4.jpg">
                <img src="Foto5.jpg">
            </div>
        </div>
    </section>

    <section style="background: var(--wine);">
        <div class="card">
            <h2>Regalos</h2>
            <p>Tendremos lluvia de sobres. Si deseas compartir fotos del evento, escanea aquí:</p>
            <div class="qr-box">
                <img src="qrphotos.png">
            </div>
            <a href="index.html" class="btn" style="background: white; color: var(--wine);">Subir Fotos 📸</a>
        </div>
    </section>

</body>
</html>
