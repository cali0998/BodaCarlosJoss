<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación de Proyecto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-principal: #2c3e50;
            --color-fondo: #f8f9fa;
            --radio-borde: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--color-fondo);
            color: var(--color-principal);
            line-height: 1.6;
        }

        .main-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        /* --- Estilo de la Portada --- */
        .header-portada {
            position: relative;
            width: 100%;
            height: 400px;
            border-radius: var(--radio-borde);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .header-portada img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* --- Contenido --- */
        .content-section {
            background: #ffffff;
            padding: 40px;
            border-radius: var(--radio-borde);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 {
            font-weight: 600;
            margin-top: 0;
            font-size: 2.2rem;
            color: #1a1a1a;
        }

        p {
            font-size: 1.1rem;
            color: #555;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }

        /* Responsividad */
        @media (max-width: 768px) {
            .header-portada {
                height: 250px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header class="header-portada">
            <img src="Foto10.jpg" alt="Portada del Proyecto">
        </header>

        <main class="content-section">
            <h1>Título del Proyecto</h1>
            <p>
                Esta sección está lista para que añadas la descripción detallada. 
                El diseño se ha optimizado para que la <strong>Foto10.jpg</strong> sea 
                el centro de atención visual en la parte superior.
            </p>
        </main>

        <footer class="footer">
            <p>&copy; 2026 - Todos los derechos reservados</p>
        </footer>
    </div>

</body>
</html>
