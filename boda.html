<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Boda Carlos & Joselyn 💍</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root { --gold: #c59d5f; }
    * { scroll-behavior: smooth; box-sizing: border-box; }
    
    body { 
      margin: 0; font-family: 'Poppins', sans-serif; 
      background: #000; color: white; overflow-x: hidden; 
    }

    section { 
      min-height: 100vh; display: flex; flex-direction: column; position: relative;
      padding: 100px 20px; background-size: cover !important;
      background-position: center !important; background-repeat: no-repeat !important;
      margin-top: -21vh;
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
      mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
    }

    /* --- FONDOS --- */
    .hero { margin-top: 0; align-items: center; justify-content: center; background: url('Foto10.jpg') center; }
    .seccion-pase { background: url('Foto11.jpg') center; align-items: flex-start; padding-left: 10%; }
    .seccion-nosotros { background: url('Foto2.jpg') center; align-items: center; }
    .seccion-musica { background: url('Foto1.jpg') center 82%; align-items: flex-start; padding-left: 10%; }
    .seccion-final { background: url('Foto14.jpg') center 75%; align-items: flex-start; padding-left: 10%; }

    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 1; }

    .glass-card {
      background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px;
      padding: 35px; width: 100%; max-width: 350px;
      position: relative; z-index: 5; text-align: center;
    }

    /* --- CARRETE INFINITO MEJORADO --- */
    .carousel-container {
      position: relative; width: 100%; max-width: 500px;
      margin-top: 25px; overflow: hidden; z-index: 10;
    }

    .carousel-track { 
      display: flex; gap: 15px; 
      transition: transform 0.4s ease-out;
      will-change: transform;
    }

    .carousel-track img { 
      width: 250px; height: 350px; object-fit: cover;
      border-radius: 20px; border: 2px solid var(--gold);
      flex-shrink: 0;
    }

    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: var(--gold); color: white; border: none;
      width: 45px; height: 45px; border-radius: 50%;
      cursor: pointer; z-index: 20; font-size: 1.2rem;
    }
    .prev { left: 10px; }
    .next { right: 10px; }

    h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--gold); margin: 0; }
    .btn { 
      background: var(--gold); color: white; padding: 15px 30px; border-radius: 50px; 
      text-decoration: none; font-weight: 600; display: inline-block; margin-top: 20px;
    }

    @media (min-width: 992px) {
      section { background-attachment: fixed; }
      .seccion-final, .seccion-musica { background-position: center 0% !important; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="overlay"></div>
    <h1>Carlos & Joselyn</h1>
    <p>19 DE DICIEMBRE DE 2026</p>
  </section>

  <section class="seccion-nosotros">
    <div class="overlay"></div>
    <div class="glass-card">
      <h2>Nuestra Historia</h2>
      <div class="carousel-container">
        <button class="carousel-btn prev" id="prevBtn">❮</button>
        <div class="carousel-track" id="carouselTrack">
          <img src="Foto1.jpg">
          <img src="Foto2.jpg">
          <img src="Foto3.jpg">
          <img src="Foto4.jpg">
          <img src="Foto5.jpg">
        </div>
        <button class="carousel-btn next" id="nextBtn">❯</button>
      </div>
    </div>
  </section>

  <section class="seccion-final">
    <div class="overlay"></div>
    <div class="glass-card">
      <h2>¡Te Esperamos!</h2>
      <a href="https://wa.me/50683484866" class="btn">Confirmar Asistencia</a>
    </div>
  </section>

  <script>
    const track = document.getElementById('carouselTrack');
    const slides = Array.from(track.children);
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    
    // Clonar la primera y última imagen para el efecto infinito
    const firstClone = slides[0].cloneNode(true);
    const lastClone = slides[slides.length - 1].cloneNode(true);
    
    track.appendChild(firstClone);
    track.insertBefore(lastClone, slides[0]);

    let index = 1; // Empezamos en la 1 porque la 0 es el clon de la última
    const slideWidth = 265; // Ancho imagen (250) + gap (15)

    // Posición inicial
    track.style.transform = `translateX(${-index * slideWidth}px)`;

    function updateCarousel() {
      track.style.transition = "transform 0.4s ease-out";
      track.style.transform = `translateX(${-index * slideWidth}px)`;
    }

    nextBtn.addEventListener('click', () => {
      if (index >= track.children.length - 1) return;
      index++;
      updateCarousel();
    });

    prevBtn.addEventListener('click', () => {
      if (index <= 0) return;
      index--;
      updateCarousel();
    });

    // El truco de la "teletransportación" invisible
    track.addEventListener('transitionend', () => {
      if (track.children[index] === firstClone) {
        track.style.transition = "none";
        index = 1;
        track.style.transform = `translateX(${-index * slideWidth}px)`;
      }
      if (track.children[index] === lastClone) {
        track.style.transition = "none";
        index = track.children.length - 2;
        track.style.transform = `translateX(${-index * slideWidth}px)`;
      }
    });
  </script>
</body>
</html>
