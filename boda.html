<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* COLORES MARSALA Y ORO */
        :root {
            --color-principal: #630d16; /* Marsala / Vino */
            --color-acento: #c5a059;    /* Dorado */
            --fondo-claro: #fdfaf6;    /* Crema suave */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--fondo-claro);
            color: #333;
            text-align: center;
        }

        /* SECCIONES */
        section {
            padding: 60px 20px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* TEXTOS */
        h1, h2 {
            font-family: 'Cinzel', serif;
            color: var(--color-principal);
            margin-bottom: 20px;
        }

        .divisor-dorado {
            width: 100px;
            height: 2px;
            background: var(--color-acento);
            margin: 20px auto;
        }

        /* BOTONES ESTILO FIXDATE */
        .boton-invitacion {
            display: inline-block;
            padding: 15px 40px;
            background-color: var(--color-principal);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: 1px solid var(--color-acento);
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .boton-invitacion:hover {
            background-color: var(--color-acento);
            color: #000;
        }

        /* CONTENEDORES DE INFORMACIÓN */
        .tarjeta-info {
            max-width: 600px;
            background: white;
            padding: 40px;
            border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <section>
        <p style="letter-spacing: 5px; font-size: 0.8rem;">ESTÁS INVITADO</p>
        <div class="divisor-dorado"></div>
        <h1>Carlos & Joselyn</h1>
        <p>19 de Diciembre de 2026</p>
    </section>

    <section style="background-color: #fff;">
        <h2>Faltan...</h2>
        <div id="countdown" style="font-size: 2.5rem; color: var(--color-acento);">-- : -- : --</div>
    </section>

    <section>
        <div class="tarjeta-info">
            <h2>Ubicación</h2>
            <p><strong>Luna Azul</strong></p>
            <p>La Rita de Pococí</p>
            <a href="#" class="boton-invitacion">VER EN MAPA</a>
        </div>
    </section>

    <section style="background-color: var(--color-principal); color: white;">
        <h2 style="color: white;">Confirmación</h2>
        <p>Es muy importante para nosotros contar con tu presencia.</p>
        <a href="#" class="boton-invitacion" style="background: white; color: var(--color-principal);">CONFIRMAR ASISTENCIA</a>
    </section>

</body>
</html>
