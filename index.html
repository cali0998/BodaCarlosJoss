<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Boda Carlos & Joselyn 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c59d5f;
      --gold-light: #e0c08d;
      --wine: #4a0a16;
      --jade: #0a2e24;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-dark: rgba(0, 0, 0, 0.2);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%);
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(197, 157, 95, 0.3);
      border-radius: 32px;
      padding: 45px 30px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      position: relative;
      transition: all 0.4s ease;
    }

    .glass-card::before {
      content: "💍";
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      background: var(--jade);
      padding: 8px 18px;
      border-radius: 50px;
      border: 1px solid var(--gold);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      color: var(--gold);
      margin: 10px 0 5px;
      letter-spacing: 1px;
    }

    .date-badge {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 35px;
      display: block;
      opacity: 0.9;
    }

    .welcome-text {
      font-weight: 300;
      line-height: 1.8;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 40px;
      transition: opacity 0.3s ease;
    }

    /* Contenedores de Estado */
    .state-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      transition: all 0.3s ease;
    }

    .hidden {
      display: none !important;
      opacity: 0;
    }

    /* Botones Principales */
    .btn-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px;
      border-radius: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-size: 14px;
      color: white;
      width: 100%;
      box-sizing: border-box;
    }

    .btn-camera {
      background: linear-gradient(135deg, var(--gold) 0%, #8c6d3f 100%);
      box-shadow: 0 8px 20px rgba(197, 157, 95, 0.2);
    }

    .btn-gallery {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-action:active { transform: scale(0.96); }

    #fileInput, #cameraInput { display: none; }

    /* --- NUEVO: Área de Previsualización --- */
    #preview-container {
      margin-top: -20px;
      margin-bottom: 30px;
    }

    #preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      margin-bottom: 25px;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: var(--glass-dark);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .preview-image {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(197, 157, 95, 0.3);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .preview-actions {
      display: flex;
      gap: 10px;
    }

    .btn-confirm {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); /* Verde Éxito */
      flex: 2;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255,255,255,0.2);
      flex: 1;
      text-transform: none;
      font-weight: 400;
    }

    /* Mensaje de Estado y carga */
    #status {
      margin-top: 10px;
      font-size: 14px;
      color: var(--gold-light);
      min-height: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .loader-ring {
      border: 2px solid rgba(255,255,255,0.1);
      border-top: 2px solid var(--gold);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
      display: none;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .quote-footer {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--gold);
      font-size: 13px;
      margin-top: 30px;
      display: block;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>

<div class="glass-card">
  <span class="date-badge">19 • DIC • 2026</span>
  <h1>Carlos & Joselyn</h1>
  
  <p class="welcome-text" id="mainText">
    ¡Bienvenidos a nuestra historia! 🥂<br><br>
    Ayúdanos a capturar cada risa y baile de esta noche mágica.
  </p>
  
  <div class="state-container" id="actions-state">
    <label for="cameraInput" class="btn-action btn-camera">
      <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12 15.5c1.93 0 3.5-1.57 3.5-3.5s-1.57-3.5-3.5-3.5-3.5 1.57-3.5 3.5 1.57 3.5 3.5 3.5z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
      Tomar Foto
    </label>
    <input type="file" id="cameraInput" accept="image/*" capture="camera" onchange="handleFileSelection(this.files)">

    <label for="fileInput" class="btn-action btn-gallery">
      <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
      Subir Archivos
    </label>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFileSelection(this.files)">
  </div>

  <div class="state-container hidden" id="preview-state">
    <div id="preview-container">
      <div id="preview-grid"></div>
      <div class="preview-actions">
        <button class="btn-action btn-cancel" onclick="cancelUpload()">Cancelar</button>
        <button class="btn-action btn-confirm" onclick="confirmAndUpload()">Subir 💖</button>
      </div>
    </div>
  </div>
  
  <div id="status" class="hidden">
    <div id="spinner" class="loader-ring"></div>
    <div id="statusText"></div>
  </div>

  <span class="quote-footer" id="quote">"Tus recuerdos son nuestro mejor regalo"</span>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const uploadPreset = "boda_carlos_y_joss";
  
  // Variable global para guardar los archivos temporalmente
  let selectedFiles = [];

  // --- PASO 1: Manejar la Selección de Archivos ---
  function handleFileSelection(files) {
    if (files.length === 0) return;
    
    selectedFiles = Array.from(files); // Guardar archivos
    const grid = document.getElementById('preview-grid');
    grid.innerHTML = ''; // Limpiar grid anterior

    // Crear previsualizaciones locales (sin subir nada aún)
    selectedFiles.forEach(file => {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'preview-image';
        grid.appendChild(img);
      }
      reader.readAsDataURL(file);
    });

    // Cambiar de estado visual
    setVisualState('preview');
  }

  // --- PASO 2: Cancelar la subida ---
  function cancelUpload() {
    selectedFiles = []; // Limpiar selección
    // Limpiar inputs de archivo para que detecten el mismo archivo si se selecciona de nuevo
    document.getElementById('cameraInput').value = '';
    document.getElementById('fileInput').value = '';
    setVisualState('init');
  }

  // --- PASO 3: Confirmar y realizar la subida real ---
  async function confirmAndUpload() {
    if (selectedFiles.length === 0) return;
    
    setVisualState('uploading');
    
    const statusText = document.getElementById('statusText');
    const spinner = document.getElementById('spinner');
    spinner.style.display = 'block';
    
    let count = 0;
    for (let file of selectedFiles) {
      count++;
      statusText.innerHTML = `<span style="color:var(--gold-light)">Enviando recuerdo ${count} de ${selectedFiles.length}...</span>`;
      
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', uploadPreset);
      formData.append('tags', 'boda_carlos_y_joss');

      try {
        await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
          method: 'POST',
          body: formData
        });
      } catch (e) {
        statusText.innerText = "Error al subir. Inténtalo de nuevo 🥂";
        spinner.style.display = 'none';
        setTimeout(cancelUpload, 2000); // Volver al inicio tras error
        return;
      }
    }

    // Finalización Exitosa
    spinner.style.display = 'none';
    statusText.innerHTML = "<b style='color:var(--gold); font-size:16px'>¡Gracias por compartir este momento! ❤️</b>";
    
    // Resetear la página tras 4 segundos
    setTimeout(cancelUpload, 4000);
  }

  // --- Función Auxiliar para gestionar los estados visuales ---
  function setVisualState(state) {
    const initActions = document.getElementById('actions-state');
    const previewActions = document.getElementById('preview-state');
    const statusArea = document.getElementById('status');
    const mainText = document.getElementById('mainText');
    const quote = document.getElementById('quote');

    // Ocultar todo por defecto
    initActions.classList.add('hidden');
    previewActions.classList.add('hidden');
    statusArea.classList.add('hidden');

    switch(state) {
      case 'init':
        initActions.classList.remove('hidden');
        mainText.style.opacity = '1';
        quote.style.opacity = '0.7';
        break;
      case 'preview':
        previewActions.classList.remove('hidden');
        mainText.style.opacity = '0.3'; // Atenuar texto de fondo
        quote.style.opacity = '0'; // Ocultar frase provisionalmente
        break;
      case 'uploading':
        statusArea.classList.remove('hidden');
        mainText.style.opacity = '0.3';
        quote.style.opacity = '0';
        break;
    }
  }
</script>

</body>
</html>
