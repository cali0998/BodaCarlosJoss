<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Boda Carlos & Joselyn 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c59d5f; --gold-light: #e0c08d;
      --wine: #4a0a16; --jade: #0a2e24;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-dark: rgba(0, 0, 0, 0.3);
    }

    body {
      margin: 0; font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%);
      background-attachment: fixed; color: white;
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
    }

    .glass-card {
      background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(197, 157, 95, 0.3); border-radius: 32px;
      padding: 45px 30px; text-align: center; max-width: 400px; width: 100%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6); position: relative;
    }

    .glass-card::before {
      content: "💍"; position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
      font-size: 28px; background: var(--jade); padding: 8px 18px; border-radius: 50px; border: 1px solid var(--gold);
    }

    h1 { font-family: 'Playfair Display', serif; font-size: 34px; color: var(--gold); margin: 10px 0 5px; }
    .date-badge { font-size: 11px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold-light); margin-bottom: 35px; display: block; }
    .welcome-text { font-weight: 300; line-height: 1.8; font-size: 15px; color: rgba(255, 255, 255, 0.95); margin-bottom: 30px; }

    .state-container { display: flex; flex-direction: column; gap: 15px; }
    .hidden { display: none !important; }

    .btn-action {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 18px; border-radius: 16px; font-weight: 600; text-transform: uppercase;
      cursor: pointer; border: none; transition: all 0.3s ease; font-size: 14px; color: white; width: 100%;
    }

    .btn-camera { background: linear-gradient(135deg, var(--gold) 0%, #8c6d3f 100%); }
    .btn-gallery { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); }
    .btn-confirm { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); flex: 2; }
    .btn-cancel { background: rgba(255, 255, 255, 0.1); flex: 1; text-transform: none; font-weight: 400; border: 1px solid rgba(255,255,255,0.2); }

    #preview-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px; margin-bottom: 25px; max-height: 220px; overflow-y: auto;
      padding: 15px; background: var(--glass-dark); border-radius: 12px;
    }

    .preview-media { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; border: 1px solid var(--gold); }

    #status { margin-top: 10px; font-size: 14px; color: var(--gold-light); min-height: 60px; display: flex; flex-direction: column; align-items: center; }
    .loader-ring { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin-bottom: 10px; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="glass-card">
  <span class="date-badge">19 • DIC • 2026</span>
  <h1>Carlos & Joselyn</h1>
  <p class="welcome-text" id="mainText">Captura la magia de nuestra noche. <br><small>(Fotos y videos cortos de hasta 20MB)</small></p>
  
  <div class="state-container" id="actions-state">
    <label for="cameraInput" class="btn-action btn-camera">Tomar Foto / Video 📸</label>
    <input type="file" id="cameraInput" accept="image/*,video/*" capture="camera" onchange="handleFileSelection(this.files)">
    <label for="fileInput" class="btn-action btn-gallery">Elegir de Galería 📂</label>
    <input type="file" id="fileInput" accept="image/*,video/*" multiple onchange="handleFileSelection(this.files)">
  </div>

  <div class="state-container hidden" id="preview-state">
    <div id="preview-grid"></div>
    <div style="display:flex; gap:10px;">
      <button class="btn-action btn-cancel" onclick="cancelUpload()">Cancelar</button>
      <button class="btn-action btn-confirm" onclick="confirmAndUpload()">Subir 💖</button>
    </div>
  </div>
  
  <div id="status" class="hidden">
    <div id="spinner" class="loader-ring"></div>
    <div id="statusText"></div>
  </div>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const uploadPreset = "boda_carlos_y_joss";
  const MAX_SIZE = 20 * 1024 * 1024; // 20MB
  let selectedFiles = [];

  function handleFileSelection(files) {
    if (files.length === 0) return;
    const grid = document.getElementById('preview-grid');
    grid.innerHTML = '';
    selectedFiles = [];

    Array.from(files).forEach(file => {
      if (file.size > MAX_SIZE) {
        alert(`El archivo "${file.name}" es muy pesado. Máximo 20MB por video.`);
        return;
      }
      selectedFiles.push(file);
      const reader = new FileReader();
      reader.onload = (e) => {
        const el = document.createElement(file.type.startsWith('video/') ? 'video' : 'img');
        el.src = e.target.result;
        el.className = 'preview-media';
        if (file.type.startsWith('video/')) { el.muted = true; el.autoplay = true; el.loop = true; }
        grid.appendChild(el);
      };
      reader.readAsDataURL(file);
    });

    if (selectedFiles.length > 0) setVisualState('preview');
  }

  async function confirmAndUpload() {
    setVisualState('uploading');
    const statusText = document.getElementById('statusText');
    document.getElementById('spinner').style.display = 'block';
    
    for (let i = 0; i < selectedFiles.length; i++) {
      statusText.innerText = `Subiendo recuerdo ${i+1} de ${selectedFiles.length}...`;
      const formData = new FormData();
      formData.append('file', selectedFiles[i]);
      formData.append('upload_preset', uploadPreset);
      formData.append('tags', 'boda_carlos_y_joss');
      try {
        await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, { method: 'POST', body: formData });
      } catch (e) { statusText.innerText = "Error en la red. Intenta de nuevo."; return; }
    }
    statusText.innerHTML = "<b>¡Gracias por este recuerdo! ❤️</b>";
    setTimeout(cancelUpload, 4000);
  }

  function cancelUpload() {
    selectedFiles = [];
    document.getElementById('cameraInput').value = '';
    document.getElementById('fileInput').value = '';
    setVisualState('init');
  }

  function setVisualState(state) {
    document.getElementById('actions-state').className = (state === 'init') ? 'state-container' : 'state-container hidden';
    document.getElementById('preview-state').className = (state === 'preview') ? 'state-container' : 'state-container hidden';
    document.getElementById('status').className = (state === 'uploading') ? '' : 'hidden';
  }
</script>
</body>
</html>
