<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Compartir Recuerdos • Carlos & Joselyn</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c59d5f;
      --gold-dark: #a67b45;
      --wine: #4a0a16;
      --jade: #0a2e24;
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(197, 157, 95, 0.3);
    }

    body {
      margin: 0; font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%);
      background-attachment: fixed; color: white;
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
    }

    .glass-card {
      background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--border); border-radius: 40px;
      padding: 60px 35px; text-align: center; max-width: 420px; width: 100%;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7); position: relative;
    }

    /* Detalle elegante superior */
    .glass-card::before {
      content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60px; height: 3px; background: var(--gold); border-radius: 0 0 10px 10px;
    }

    h1 { font-family: 'Playfair Display', serif; font-size: 38px; color: var(--gold); margin: 0 0 10px; font-weight: 600; }
    
    .date-badge { 
      font-size: 10px; letter-spacing: 6px; text-transform: uppercase; 
      color: rgba(255,255,255,0.6); margin-bottom: 40px; display: block; 
    }

    .welcome-text { font-size: 15px; font-weight: 300; line-height: 1.6; color: rgba(255,255,255,0.8); margin-bottom: 40px; }
    
    .state-container { display: flex; flex-direction: column; gap: 15px; }
    .hidden { display: none !important; }

    /* BOTONES ESTILO BOUTIQUE */
    .btn-action {
      display: flex; align-items: center; justify-content: center; gap: 15px;
      padding: 20px; border-radius: 20px; font-weight: 400; text-transform: uppercase;
      cursor: pointer; border: none; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      font-size: 12px; letter-spacing: 2px; color: white; width: 100%;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-primary { background: var(--gold); color: black; font-weight: 600; border: none; }
    .btn-primary:active { background: var(--gold-dark); transform: scale(0.98); }

    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--gold); }
    .btn-secondary:active { background: rgba(197, 157, 95, 0.1); }

    /* OCULTAR INPUTS */
    input[type="file"] { display: none !important; }

    #preview-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 30px; max-height: 250px; overflow-y: auto;
      padding: 15px; background: rgba(0,0,0,0.2); border-radius: 20px;
    }

    .preview-media { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); }

    /* BARRA DE PROGRESO MINIMALISTA */
    #status { margin-top: 20px; }
    .progress-bar-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 15px; position: relative; overflow: hidden; }
    .progress-bar-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--gold); width: 0%; transition: width 0.3s ease; }

    #statusText { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); }

  </style>
</head>
<body>

<div class="glass-card">
  <span class="date-badge">19 • Diciembre • 2026</span>
  <h1>Carlos & Joselyn</h1>
  <p class="welcome-text" id="mainText">
    Ayúdanos a capturar cada momento de nuestra historia.
  </p>
  
  <div class="state-container" id="actions-state">
    
    <label for="cameraPhotoInput" class="btn-action btn-primary">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Capturar Foto
    </label>
    <input type="file" id="cameraPhotoInput" accept="image/*" capture="environment" onchange="handleFileSelection(this.files)">
    
    <label for="cameraVideoInput" class="btn-action btn-secondary">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      Grabar Video
    </label>
    <input type="file" id="cameraVideoInput" accept="video/*" capture="environment" onchange="handleFileSelection(this.files)">
    
    <label for="fileInput" class="btn-action" style="opacity: 0.7;">
      Subir de la Galería
    </label>
    <input type="file" id="fileInput" accept="image/*,video/*" multiple onchange="handleFileSelection(this.files)">
    
  </div>

  <div class="state-container hidden" id="preview-state">
    <div id="preview-grid"></div>
    <div style="display:flex; gap:10px;">
      <button class="btn-action" style="flex:1" onclick="cancelUpload()">Volver</button>
      <button class="btn-action btn-primary" style="flex:2" onclick="confirmAndUpload()">Enviar Recuerdos</button>
    </div>
  </div>
  
  <div id="status" class="hidden">
    <div id="statusText">Iniciando subida...</div>
    <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
  </div>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const uploadPreset = "boda_carlos_y_joss";
  const MAX_SIZE = 25 * 1024 * 1024; // Aumentado a 25MB
  let selectedFiles = [];

  function handleFileSelection(files) {
    if (files.length === 0) return;
    const grid = document.getElementById('preview-grid');
    grid.innerHTML = '';
    selectedFiles = [];

    Array.from(files).forEach(file => {
      if (file.size > MAX_SIZE) {
        alert(`El archivo supera el límite permitido.`);
        return;
      }
      selectedFiles.push(file);
      const reader = new FileReader();
      reader.onload = (e) => {
        const el = document.createElement(file.type.startsWith('video/') ? 'video' : 'img');
        el.src = e.target.result;
        el.className = 'preview-media';
        if (file.type.startsWith('video/')) { el.muted = true; el.autoplay = true; el.loop = true; }
        grid.appendChild(el);
      };
      reader.readAsDataURL(file);
    });

    if (selectedFiles.length > 0) setVisualState('preview');
  }

  async function confirmAndUpload() {
    setVisualState('uploading');
    const statusText = document.getElementById('statusText');
    const bar = document.getElementById('progress-fill');
    
    for (let i = 0; i < selectedFiles.length; i++) {
      let progress = ((i) / selectedFiles.length) * 100;
      bar.style.width = `${progress}%`;
      statusText.innerText = `Enviando recuerdo ${i+1} de ${selectedFiles.length}`;
      
      const formData = new FormData();
      formData.append('file', selectedFiles[i]);
      formData.append('upload_preset', uploadPreset);
      formData.append('tags', 'boda_carlos_y_joss');
      
      try {
        await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, { method: 'POST', body: formData });
      } catch (e) { 
        statusText.innerText = "Error de conexión"; 
        return; 
      }
    }
    
    bar.style.width = '100%';
    statusText.innerHTML = "<b>Recuerdos guardados con éxito</b>";
    setTimeout(cancelUpload, 3000);
  }

  function cancelUpload() {
    selectedFiles = [];
    document.getElementById('cameraPhotoInput').value = '';
    document.getElementById('cameraVideoInput').value = '';
    document.getElementById('fileInput').value = '';
    setVisualState('init');
  }

  function setVisualState(state) {
    document.getElementById('actions-state').className = (state === 'init') ? 'state-container' : 'state-container hidden';
    document.getElementById('preview-state').className = (state === 'preview') ? 'state-container' : 'state-container hidden';
    document.getElementById('status').className = (state === 'uploading') ? '' : 'hidden';
    document.getElementById('mainText').style.opacity = (state === 'init') ? '1' : '0.3';
  }
</script>
</body>
</html>
