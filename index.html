<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Boda Carlos & Joselyn 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c59d5f;
      --gold-light: #e0c08d;
      --wine: #4a0a16;
      --jade: #0a2e24;
      --glass: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%);
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(197, 157, 95, 0.3);
      border-radius: 28px;
      padding: 45px 30px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      position: relative;
    }

    .glass-card::before {
      content: "💍";
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      background: var(--jade);
      padding: 8px 18px;
      border-radius: 50px;
      border: 1px solid var(--gold);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: var(--gold);
      margin: 10px 0 5px;
      letter-spacing: 1px;
    }

    .date-badge {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 35px;
      display: block;
      opacity: 0.9;
    }

    .welcome-text {
      font-weight: 300;
      line-height: 1.8;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 40px;
    }

    /* Contenedor de botones */
    .actions-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Estilo Base para Botones */
    .btn-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px;
      border-radius: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      font-size: 14px;
      color: white;
      text-decoration: none;
    }

    /* Botón Cámara (Principal) */
    .btn-camera {
      background: linear-gradient(135deg, var(--gold) 0%, #8c6d3f 100%);
      box-shadow: 0 8px 20px rgba(197, 157, 95, 0.2);
    }

    /* Botón Galería (Secundario) */
    .btn-gallery {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-action:active {
      transform: scale(0.96);
    }

    #fileInput, #cameraInput { display: none; }

    #status {
      margin-top: 30px;
      font-size: 13px;
      color: var(--gold-light);
      min-height: 20px;
    }

    .quote-footer {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--gold);
      font-size: 13px;
      margin-top: 30px;
      display: block;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="glass-card">
  <span class="date-badge">19 • DIC • 2026</span>
  <h1>Carlos & Joselyn</h1>
  
  <p class="welcome-text">
    ¡Bienvenidos a nuestra historia! 🥂<br><br>
    Ayúdanos a capturar cada risa y baile de esta noche mágica.
  </p>
  
  <div class="actions-container">
    <label for="cameraInput" class="btn-action btn-camera">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 15.5c1.93 0 3.5-1.57 3.5-3.5s-1.57-3.5-3.5-3.5-3.5 1.57-3.5 3.5 1.57 3.5 3.5 3.5z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
      Tomar Foto
    </label>
    <input type="file" id="cameraInput" accept="image/*" capture="camera" onchange="uploadFiles(this.files)">

    <label for="fileInput" class="btn-action btn-gallery">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
      Subir Archivos
    </label>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="uploadFiles(this.files)">
  </div>
  
  <div id="status"></div>
  <span class="quote-footer">"Tus recuerdos son nuestro mejor regalo"</span>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const uploadPreset = "boda_carlos_y_joss";

  async function uploadFiles(files) {
    const status = document.getElementById('status');
    let count = 0;
    
    for (let file of files) {
      count++;
      status.innerText = `Enviando recuerdo ${count} de ${files.length}...`;
      
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', uploadPreset);
      formData.append('tags', 'boda_carlos_y_joss');

      try {
        await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
          method: 'POST',
          body: formData
        });
      } catch (e) {
        status.innerText = "Error al subir 🥂";
      }
    }
    status.innerText = "¡Gracias por compartir! ❤️";
    setTimeout(() => { status.innerText = ""; }, 4000);
  }
</script>

</body>
</html>
