<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boda Carlos & Joss 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #c59d5f; --dark-gold: #a67c3d; --wine: #5a0f1c; --emerald: #0f3d2e; }
    body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--wine), var(--emerald)); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .card { background: rgba(255, 255, 255, 0.98); padding: 40px 25px; border-radius: 25px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid var(--gold); }
    h1 { font-family: 'Playfair Display', serif; font-size: 30px; margin-bottom: 5px; color: var(--gold); }
    .date { font-size: 14px; color: #888; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
    .selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .btn-select { background: #fff; border: 1.5px solid #eee; color: #555; padding: 20px 10px; border-radius: 20px; cursor: pointer; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .btn-select span { font-size: 24px; }
    .btn-primary { background: linear-gradient(135deg, var(--gold), var(--dark-gold)); color: white; width: 100%; padding: 18px; border-radius: 35px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; }
    .btn-primary:disabled { opacity: 0.5; filter: grayscale(1); }
    #preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; margin-bottom: 20px; max-height: 150px; overflow-y: auto; }
    #preview img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; border: 1px solid #ddd; }
    .progress-container { width: 100%; background: #f0f0f0; border-radius: 10px; margin-bottom: 15px; display: none; overflow: hidden; }
    .progress-bar { width: 0%; height: 10px; background: var(--gold); transition: width 0.3s; }
    #status { font-size: 14px; margin-top: 15px; }
  </style>
</head>
<body>
<div class="card">
  <h1>💍 Carlos & Joss</h1>
  <div class="date">19 de Diciembre 2026</div>
  <p>¡Gracias por acompañarnos! Sube tus fotos aquí ❤️</p>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="galleryInput" accept="image/*" multiple style="display:none">
  <div class="selection-grid">
    <button class="btn-select" onclick="document.getElementById('cameraInput').click()"><span>📸</span> Tomar Foto</button>
    <button class="btn-select" onclick="document.getElementById('galleryInput').click()"><span>🖼️</span> Galería</button>
  </div>
  <div id="preview"></div>
  <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
  <button class="btn-primary" onclick="upload()" id="uploadBtn">Enviar fotos</button>
  <p id="status"></p>
</div>
<script>
  const cloudName = "dhruy6ftj";
  const uploadPreset = "boda_carlos_y_joss";
  const tagBoda = "boda_carlos_y_joss";
  let allFiles = [];
  const cameraInput = document.getElementById("cameraInput");
  const galleryInput = document.getElementById("galleryInput");
  const status = document.getElementById("status");
  const uploadBtn = document.getElementById("uploadBtn");
  const progressBar = document.getElementById("progressBar");
  const progressContainer = document.getElementById("progressContainer");
  const preview = document.getElementById("preview");
  cameraInput.addEventListener("change", handleFiles);
  galleryInput.addEventListener("change", handleFiles);
  function handleFiles(e) {
    const newFiles = Array.from(e.target.files);
    allFiles = [...allFiles, ...newFiles];
    renderPreview();
    status.innerText = `${allFiles.length} foto(s) listas ✨`;
  }
  function renderPreview() {
    preview.innerHTML = "";
    allFiles.forEach((file) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = document.createElement("img");
        img.src = e.target.result;
        preview.appendChild(img);
      };
      reader.readAsDataURL(file);
    });
  }
  async function upload() {
    if (allFiles.length === 0) { status.innerText = "Selecciona fotos primero 📸"; return; }
    uploadBtn.disabled = true;
    progressContainer.style.display = "block";
    let uploadedCount = 0;
    for (let i = 0; i < allFiles.length; i++) {
      const formData = new FormData();
      formData.append("file", allFiles[i]);
      formData.append("upload_preset", uploadPreset);
      formData.append("tags", tagBoda);
      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method: "POST", body: formData });
        if (response.ok) {
          uploadedCount++;
          progressBar.style.width = (uploadedCount / allFiles.length * 100) + "%";
          status.innerText = `Subiendo: ${uploadedCount} de ${allFiles.length}`;
        }
      } catch (error) { console.error(error); }
    }
    if (uploadedCount === allFiles.length) {
      status.innerText = "¡Enviado con éxito! 🎉";
      status.style.color = "#27ae60";
      setTimeout(resetUI, 4000);
    }
  }
  function resetUI() { allFiles = []; cameraInput.value = ""; galleryInput.value = ""; preview.innerHTML = ""; progressContainer.style.display = "none"; progressBar.style.width = "0%"; uploadBtn.disabled = false; status.innerText = ""; }
</script>
</body>
</html>
