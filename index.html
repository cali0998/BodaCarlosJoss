<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Boda Carlos & Joselyn 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c59d5f;
      --gold-light: #e0c08d;
      --wine: #4a0a16;
      --jade: #0a2e24;
      --glass: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%);
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(197, 157, 95, 0.3);
      border-radius: 32px;
      padding: 45px 30px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      position: relative;
    }

    .glass-card::before {
      content: "💍";
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      background: var(--jade);
      padding: 8px 18px;
      border-radius: 50px;
      border: 1px solid var(--gold);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      color: var(--gold);
      margin: 10px 0 5px;
      letter-spacing: 1px;
    }

    .date-badge {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 35px;
      display: block;
      opacity: 0.9;
    }

    .welcome-text {
      font-weight: 300;
      line-height: 1.8;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 40px;
    }

    /* Contenedor de botones que se ocultará */
    .actions-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      transition: opacity 0.4s ease;
    }

    .btn-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px;
      border-radius: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-size: 14px;
      color: white;
    }

    .btn-camera {
      background: linear-gradient(135deg, var(--gold) 0%, #8c6d3f 100%);
      box-shadow: 0 8px 20px rgba(197, 157, 95, 0.2);
    }

    .btn-gallery {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-action:active { transform: scale(0.95); }

    #fileInput, #cameraInput { display: none; }

    /* Mensaje de Estado y carga */
    #status {
      margin-top: 10px;
      font-size: 14px;
      color: var(--gold-light);
      min-height: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .loader-ring {
      border: 2px solid rgba(255,255,255,0.1);
      border-top: 2px solid var(--gold);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
      display: none;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .quote-footer {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--gold);
      font-size: 13px;
      margin-top: 30px;
      display: block;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="glass-card">
  <span class="date-badge">19 • DIC • 2026</span>
  <h1>Carlos & Joselyn</h1>
  
  <p class="welcome-text" id="mainText">
    ¡Bienvenidos a nuestra historia! 🥂<br><br>
    Ayúdanos a capturar cada risa y baile de esta noche mágica.
  </p>
  
  <div class="actions-container" id="actions">
    <label for="cameraInput" class="btn-action btn-camera">
      <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12 15.5c1.93 0 3.5-1.57 3.5-3.5s-1.57-3.5-3.5-3.5-3.5 1.57-3.5 3.5 1.57 3.5 3.5 3.5z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
      Tomar Foto
    </label>
    <input type="file" id="cameraInput" accept="image/*" capture="camera" onchange="uploadFiles(this.files)">

    <label for="fileInput" class="btn-action btn-gallery">
      <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
      Subir Archivos
    </label>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="uploadFiles(this.files)">
  </div>
  
  <div id="status">
    <div id="spinner" class="loader-ring"></div>
    <div id="statusText"></div>
  </div>

  <span class="quote-footer">"Tus recuerdos son nuestro mejor regalo"</span>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const uploadPreset = "boda_carlos_y_joss";

  async function uploadFiles(files) {
    const statusText = document.getElementById('statusText');
    const spinner = document.getElementById('spinner');
    const actions = document.getElementById('actions');
    const mainText = document.getElementById('mainText');
    
    // 1. Efecto Visual: Ocultar botones y texto de bienvenida
    actions.style.display = 'none';
    mainText.style.opacity = '0.3';
    spinner.style.display = 'block';
    
    let count = 0;
    for (let file of files) {
      count++;
      statusText.innerHTML = `<span style="color:var(--gold-light)">Enviando recuerdo ${count} de ${files.length}...</span>`;
      
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', uploadPreset);
      formData.append('tags', 'boda_carlos_y_joss');

      try {
        await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
          method: 'POST',
          body: formData
        });
      } catch (e) {
        statusText.innerText = "Error al subir. Inténtalo de nuevo 🥂";
        spinner.style.display = 'none';
        actions.style.display = 'flex';
        return;
      }
    }

    // 2. Finalización Exitosa
    spinner.style.display = 'none';
    statusText.innerHTML = "<b style='color:var(--gold); font-size:16px'>¡Gracias por compartir este momento! ❤️</b>";
    
    // 3. Resetear la página tras 4 segundos
    setTimeout(() => {
      statusText.innerHTML = "";
      actions.style.display = 'flex';
      mainText.style.opacity = '1';
    }, 4000);
  }
</script>

</body>
</html>
