<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizador de Mesas • Carlos & Joselyn</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #c59d5f;
      --wine: #4a0a16;
      --jade: #0a2e24;
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(197, 157, 95, 0.3);
      /* Colores de estado */
      --status-conf: #2ecc71; /* Verde */
      --status-pend: #f1c40f; /* Amarillo/Dorado */
      --status-decl: #e74c3c; /* Rojo */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    
    body {
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%);
      background-attachment: fixed; color: white; height: 100vh; display: flex; flex-direction: column;
    }

    header {
      padding: 20px; text-align: center; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border);
    }
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2rem; margin-bottom: 5px; }
    #connection-status { font-size: 0.8rem; opacity: 0.7; letter-spacing: 1px; }

    .container {
      display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px;
    }

    /* LISTA DE INVITADOS SIN MESA */
    .sidebar {
      width: 320px; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 20px; display: flex; flex-direction: column;
    }
    
    .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; }
    .sidebar-header h3 { color: var(--gold); font-size: 1.2rem; margin-bottom: 10px;}

    /* LEYENDA DE ESTADOS */
    .legend { display: flex; justify-content: center; gap: 12px; font-size: 0.7rem; opacity: 0.9; margin-bottom: 5px;}
    .legend-item { display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 1px;}
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    
    .guest-list {
      flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
      min-height: 200px;
    }

    /* INVITADO (DRAGGABLE) CON ESTADOS DE COLOR */
    .guest {
      background: rgba(255,255,255,0.1); padding: 12px 15px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1); cursor: grab; font-size: 0.85rem;
      transition: all 0.2s; display: flex; justify-content: space-between; align-items: center;
      border-left: 5px solid transparent; /* Espacio para el color */
    }

    /* Clases de estado aplicadas por JS */
    .guest.status-confirmado { border-left-color: var(--status-conf); background: rgba(46, 204, 113, 0.1); }
    .guest.status-pendiente { border-left-color: var(--status-pend); background: rgba(241, 196, 15, 0.05); }
    .guest.status-declinado { border-left-color: var(--status-decl); opacity: 0.3; text-decoration: line-through; cursor: not-allowed; }

    .guest:active:not(.status-declinado) { cursor: grabbing; transform: scale(0.95); background: var(--gold); color: black; font-weight: bold; border-left-color: transparent;}
    .guest.dragging { opacity: 0.5; }

    /* ÁREA DE MESAS */
    .main-area {
      flex: 1; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px;
      overflow-y: auto; display: flex; flex-wrap: wrap; gap: 20px; align-content: flex-start;
      border: 1px dashed rgba(255,255,255,0.1);
    }

    /* MESA */
    .table-card {
      width: calc(33.333% - 14px); min-width: 250px; background: var(--glass);
      backdrop-filter: blur(10px); border: 1px solid var(--gold); border-radius: 15px;
      display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .table-header {
      background: rgba(197, 157, 95, 0.15); padding: 15px; border-radius: 15px 15px 0 0;
      border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
    }
    .table-header input {
      background: transparent; border: none; color: white; font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: bold; width: 60%; outline: none;
    }
    
    .table-controls { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; opacity: 0.8; }
    .btn-small { background: rgba(255,255,255,0.1); border: none; color: white; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; }
    .btn-small:hover { background: var(--gold); color: black; }

    .table-seats {
      padding: 15px; min-height: 150px; flex: 1; display: flex; flex-direction: column; gap: 8px;
    }
    .table-seats.drag-over { background: rgba(197, 157, 95, 0.1); }

    .seat-count { text-align: center; padding: 10px; font-size: 0.8rem; color: var(--gold); border-top: 1px solid var(--border); }

    /* BOTONES GLOBALES */
    .btn {
      background: var(--gold); color: white; padding: 12px; border-radius: 10px; border: none;
      font-weight: 600; cursor: pointer; flex: 1; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s;
    }
    .btn:active { transform: scale(0.95); }
    
    /* Loader */
    .loader { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid var(--gold); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>Diseño de Mesas</h1>
    <div id="connection-status">Sincronizando invitados...</div>
  </header>

  <div class="container">
    
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>Lista de Invitados</h3>
        <div class="legend">
          <div class="legend-item"><div class="dot" style="background:var(--status-conf)"></div> Conf.</div>
          <div class="legend-item"><div class="dot" style="background:var(--status-pend)"></div> Pend.</div>
          <div class="legend-item"><div class="dot" style="background:var(--status-decl)"></div> Decl.</div>
        </div>
      </div>
      <div class="guest-list" id="unseated-guests">
        <div class="loader" id="loading-guests"></div>
        </div>
    </div>

    <div class="main-area" id="floor-plan">
      </div>

  </div>

  <button class="btn" style="position: fixed; bottom: 30px; right: 30px; width: 180px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);" onclick="addTable()">+ Nueva Mesa</button>

<script>
  // --- CREDENCIALES DE SUPABASE INYECTADAS ---
  const SUPABASE_URL = 'https://kuwtppqumrhdnveaocgt.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1d3RwcHF1bXJoZG52ZWFvY2d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDU1ODUsImV4cCI6MjA5MDQ4MTU4NX0.jj5QIOAQ4RVSMRm_syaMXvaIURoqJD2KerOhr848WSw';

  let tableCount = 0;
  let draggedItem = null;

  // --- CARGAR ABSOLUTAMENTE TODOS LOS INVITADOS ---
  async function loadAllGuests() {
    const statusText = document.getElementById('connection-status');
    const guestList = document.getElementById('unseated-guests');
    
    try {
      // Petición sin filtros de estado para traer a todos
      const response = await fetch(`${SUPABASE_URL}/rest/v1/invitados?select=id,nombre,pases,estado,mesa`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      
      if (!response.ok) throw new Error('Error al conectar con la base de datos');
      
      const invitados = await response.json();
      document.getElementById('loading-guests').style.display = 'none';
      statusText.innerText = `${invitados.length} Invitados Totales Sincronizados`;

      invitados.forEach(invitado => {
        // Determinar la clase CSS de estado
        let statusClass = 'status-pendiente'; // Por defecto si está vacío o nulo
        let isDraggable = true;

        if (invitado.estado === 'Confirmado') {
            statusClass = 'status-confirmado';
        } else if (invitado.estado === 'Declinado') {
            statusClass = 'status-declinado';
            isDraggable = false; // No tiene sentido mover a alguien que no va
        }

        // Por cada pase, creamos una silla "virtual" arrastrable
        for (let i = 1; i <= invitado.pases; i++) {
          const suffix = invitado.pases > 1 ? ` (${i}/${invitado.pases})` : '';
          const guestName = `${invitado.nombre}${suffix}`;
          const uniqueId = `guest-${invitado.id}-${i}`;
          
          const guestHTML = `
            <div class="guest ${statusClass}" draggable="${isDraggable}" id="${uniqueId}" data-db-id="${invitado.id}">
              ${guestName}
            </div>
          `;
          guestList.insertAdjacentHTML('beforeend', guestHTML);
        }
      });

    } catch (error) {
      document.getElementById('loading-guests').style.display = 'none';
      statusText.innerText = "Error de conexión. Recarga la página.";
      statusText.style.color = "#e74c3c";
    }
  }

  // --- LÓGICA DE DRAG & DROP (Actualizada para bloquear declinados) ---
  document.addEventListener('dragstart', (e) => {
    if(e.target.classList.contains('guest') && !e.target.classList.contains('status-declinado')) {
      draggedItem = e.target;
      setTimeout(() => e.target.classList.add('dragging'), 0);
    } else if (e.target.classList.contains('status-declinado')) {
        e.preventDefault(); // Evita que empiece el arrastre
    }
  });

  document.addEventListener('dragend', (e) => {
    if(e.target.classList.contains('guest')) {
      e.target.classList.remove('dragging');
      draggedItem = null;
      updateAllCounters();
    }
  });

  function setupDropZone(zone) {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      // Bloquear drop si la mesa está llena
      if(zone.classList.contains('table-seats')) {
        const capacity = parseInt(zone.dataset.capacity);
        const currentCount = zone.querySelectorAll('.guest').length;
        if(currentCount >= capacity && draggedItem.parentElement !== zone) return;
      }
      zone.classList.add('drag-over');
    });

    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));

    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      // Solo permitir drop si hay un ítem arrastrándose (evita errores con declinados)
      if (draggedItem) {
        zone.appendChild(draggedItem);
        // Aquí guardaremos en el futuro
        console.log(`Movido: ${draggedItem.innerText} -> ${zone.id}`); 
      }
    });
  }

  // Zona de la lista izquierda (para devolver invitados)
  setupDropZone(document.getElementById('unseated-guests'));

  // --- LÓGICA DE MESAS ---
  function addTable(capacity = 8) {
    tableCount++;
    const tableId = `table-${tableCount}`;
    
    const tableHTML = `
      <div class="table-card" id="${tableId}">
        <div class="table-header">
          <input type="text" value="Mesa ${tableCount}">
          <div class="table-controls">
            <button class="btn-small" onclick="changeCapacity('${tableId}', -1)">-</button>
            <span class="cap-display">${capacity}</span>
            <button class="btn-small" onclick="changeCapacity('${tableId}', 1)">+</button>
          </div>
        </div>
        <div class="table-seats" data-capacity="${capacity}" id="seats-${tableId}">
          </div>
        <div class="seat-count" id="count-${tableId}">0 / ${capacity} sillas ocupadas</div>
      </div>
    `;

    document.getElementById('floor-plan').insertAdjacentHTML('beforeend', tableHTML);
    setupDropZone(document.getElementById(`seats-${tableId}`));
  }

  function changeCapacity(tableId, change) {
    const seatsZone = document.getElementById(`seats-${tableId}`);
    let cap = parseInt(seatsZone.dataset.capacity) + change;
    if(cap < 1) cap = 1;
    
    const currentGuests = seatsZone.querySelectorAll('.guest').length;
    if(cap < currentGuests) {
      alert("No puedes quitar sillas si ya hay invitados sentados. Mueve al invitado primero.");
      return;
    }

    seatsZone.dataset.capacity = cap;
    document.querySelector(`#${tableId} .cap-display`).innerText = cap;
    updateCounter(tableId);
  }

  function updateCounter(tableId) {
    const seatsZone = document.getElementById(`seats-${tableId}`);
    const currentCount = seatsZone.querySelectorAll('.guest').length;
    const cap = seatsZone.dataset.capacity;
    document.getElementById(`count-${tableId}`).innerText = `${currentCount} / ${cap} sillas ocupadas`;
    
    // Cambiar color si está llena
    if(currentCount >= cap) {
      document.getElementById(`count-${tableId}`).style.color = "#e74c3c"; // Rojo
    } else {
      document.getElementById(`count-${tableId}`).style.color = "var(--gold)";
    }
  }

  function updateAllCounters() {
    // Buscar todas las tarjetas de mesa actuales
    document.querySelectorAll('.table-card').forEach(table => {
        updateCounter(table.id);
    });
  }

  // --- INICIALIZACIÓN ---
  window.onload = () => {
    // Mesas por defecto
    addTable(8);
    addTable(8);
    addTable(10);
    loadAllGuests(); // Cargar la base de datos
  };
</script>
</body>
</html>
