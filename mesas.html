<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano del Salón</title>
    <style>
        :root {
            --verde-jade: #00A86B;
            --vino: #722F37;
            --dorado: #D4AF37;
            --fondo: #fcfcfc;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h2 {
            color: var(--vino);
            margin-bottom: 10px;
        }

        /* El contenedor principal que representa el salón */
        #salon {
            width: 800px;
            height: 500px;
            background-color: var(--fondo);
            border: 4px solid var(--verde-jade);
            border-radius: 10px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Estilo base para las mesas */
        .mesa {
            width: 80px;
            height: 80px;
            background-color: white;
            border: 3px solid var(--dorado);
            border-radius: 50%; /* Mesas redondas */
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--vino);
            cursor: grab;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        /* Efecto al hacer clic en la mesa */
        .mesa:active {
            cursor: grabbing;
            transform: scale(1.05);
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        /* Mesa principal rectangular */
        .mesa-principal {
            width: 150px;
            height: 60px;
            border-radius: 10px;
            background-color: var(--verde-jade);
            color: white;
            border: 3px solid var(--dorado);
        }
    </style>
</head>
<body>

    <h2>Distribución de Mesas</h2>
    <p>Haz clic y arrastra las mesas para acomodarlas dentro del salón.</p>

    <div id="salon">
        <div class="mesa mesa-principal" style="top: 20px; left: 320px;">Principal</div>
        <div class="mesa" style="top: 150px; left: 100px;">1</div>
        <div class="mesa" style="top: 150px; left: 360px;">2</div>
        <div class="mesa" style="top: 150px; left: 620px;">3</div>
        <div class="mesa" style="top: 300px; left: 230px;">4</div>
        <div class="mesa" style="top: 300px; left: 490px;">5</div>
    </div>

    <script>
        // Lógica para arrastrar y soltar (Drag and Drop)
        const mesas = document.querySelectorAll('.mesa');
        const salon = document.getElementById('salon');
        
        let mesaActiva = null;
        let offsetX = 0;
        let offsetY = 0;

        // Cuando el usuario hace clic en una mesa
        mesas.forEach(mesa => {
            mesa.addEventListener('mousedown', (e) => {
                mesaActiva = mesa;
                // Calculamos la diferencia entre el clic del ratón y la esquina de la mesa
                offsetX = e.clientX - mesa.getBoundingClientRect().left;
                offsetY = e.clientY - mesa.getBoundingClientRect().top;
            });
        });

        // Cuando el usuario mueve el ratón por toda la pantalla
        document.addEventListener('mousemove', (e) => {
            if (!mesaActiva) return;

            const salonRect = salon.getBoundingClientRect();

            // Calculamos la nueva posición relativa al contenedor del salón
            let nuevaPosicionX = e.clientX - salonRect.left - offsetX;
            let nuevaPosicionY = e.clientY - salonRect.top - offsetY;

            // Límites para que las mesas no se salgan del salón
            if (nuevaPosicionX < 0) nuevaPosicionX = 0;
            if (nuevaPosicionY < 0) nuevaPosicionY = 0;
            if (nuevaPosicionX + mesaActiva.offsetWidth > salonRect.width) {
                nuevaPosicionX = salonRect.width - mesaActiva.offsetWidth;
            }
            if (nuevaPosicionY + mesaActiva.offsetHeight > salonRect.height) {
                nuevaPosicionY = salonRect.height - mesaActiva.offsetHeight;
            }

            // Aplicamos las nuevas coordenadas
            mesaActiva.style.left = `${nuevaPosicionX}px`;
            mesaActiva.style.top = `${nuevaPosicionY}px`;
        });

        // Cuando el usuario suelta el clic del ratón
        document.addEventListener('mouseup', () => {
            mesaActiva = null;
        });
    </script>

</body>
</html>
