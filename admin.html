<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Galería • Carlos & Joselyn 💍</title>
  
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="dns-prefetch" href="https://res.cloudinary.com">
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root { 
      --gold: #c59d5f; 
      --wine: #4a0a16; 
      --jade: #0a2e24; 
      --glass: rgba(255, 255, 255, 0.08); 
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Poppins', sans-serif; 
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%); 
      background-attachment: fixed; color: white; min-height: 100vh;
      overflow-x: hidden;
    }
    
    header { 
      padding: 25px 20px; text-align: center; 
      background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(197, 157, 95, 0.3); position: sticky; top: 0; z-index: 100;
    }
    
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.8rem; letter-spacing: 1px; }
    
    #gallery { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 8px; padding: 15px; max-width: 900px; margin: 0 auto;
      transform: translateZ(0); 
    }
    
    .media-card { 
      aspect-ratio: 1/1; background: var(--glass); border-radius: 12px; 
      overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.05);
      content-visibility: auto;
      contain-intrinsic-size: 100px 100px;
    }

    .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    
    .play-icon { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      background: rgba(0,0,0,0.6); border-radius: 50%; width: 40px; height: 40px; 
      display: flex; align-items: center; justify-content: center; color: white;
    }

    /* BOTÓN ACTUALIZAR */
    .btn-update {
      position: fixed; bottom: 30px; right: 20px; background: var(--gold);
      width: 55px; height: 55px; border-radius: 50%; border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 999;
      display: flex; align-items: center; justify-content: center; color: white;
      cursor: pointer; transition: transform 0.3s ease;
    }
    .btn-update:active { transform: scale(0.9) rotate(180deg); }

    /* MODAL CON ESTÉTICA DE CRISTAL OSCURO */
    .modal {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.96); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      align-items: center; justify-content: center; opacity: 0; 
      transition: opacity 0.25s ease-out;
    }
    .modal.show { opacity: 1; display: flex; }

    #modal-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .modal-media { 
      max-width: 100%; max-height: 80vh; object-fit: contain; 
      border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      transform: translateZ(0);
    }

    /* BOTONES DE NAVEGACIÓN UNIFICADOS */
    .nav-btn {
      position: absolute; bottom: 40px; background: rgba(197, 157, 95, 0.9);
      color: white; width: 60px; height: 50px; border: none;
      border-radius: 15px; font-size: 20px; z-index: 10; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .prev { left: 20px; } .next { right: 20px; }
    
    @media (min-width: 600px) {
      .nav-btn { top: 50%; bottom: auto; transform: translateY(-50%); width: 55px; height: 55px; border-radius: 50%; }
      .prev { left: 30px; } .next { right: 30px; }
      #gallery { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    }

    .close-modal { position: absolute; top: 25px; right: 20px; font-size: 40px; color: white; z-index: 11; cursor: pointer; }
    .counter-text { position: absolute; bottom: 55px; font-size: 11px; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>

<header>
  <h1>Nuestros Recuerdos</h1>
  <div id="status" style="font-size: 10px; opacity: 0.6; margin-top: 5px; letter-spacing: 1px;">SINCRONIZANDO...</div>
</header>

<div id="gallery"></div>

<button class="btn-update" onclick="loadGallery()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
</button>

<div id="mediaModal" class="modal">
  <span class="close-modal" onclick="closeModal()">&times;</span>
  <div id="modal-content">
    <button class="nav-btn prev" onclick="move(-1, event)">&#10094;</button>
    <div id="media-container" style="width:100%; display:flex; justify-content:center;"></div>
    <button class="nav-btn next" onclick="move(1, event)">&#10095;</button>
    <div class="counter-text" id="modal-counter"></div>
  </div>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const tag = "boda_carlos_y_joss";
  let items = [];
  let currentIndex = 0;

  async function loadGallery() {
    const status = document.getElementById('status');
    try {
      const [imgRes, vidRes] = await Promise.allSettled([
        fetch(`https://res.cloudinary.com/${cloudName}/image/list/v${Date.now()}/${tag}.json`).then(r => r.json()),
        fetch(`https://res.cloudinary.com/${cloudName}/video/list/v${Date.now()}/${tag}.json`).then(r => r.json()).catch(() => ({resources:[]}))
      ]);

      let all = [];
      if (imgRes.status === 'fulfilled') all = [...all, ...(imgRes.value.resources || [])];
      if (vidRes.status === 'fulfilled') all = [...all, ...(vidRes.value.resources || [])];

      items = all.sort((a,b) => b.version - a.version).map(m => {
        const isVid = ['mp4','mov','webm'].includes(m.format.toLowerCase());
        const type = isVid ? 'video' : 'image';
        
        // 🔥 FILTRO TIPO CÁMARA DESECHABLE: Se aplica solo a las fotos
        // e_contrast:20 (Alto contraste), e_saturation:30 (Colores vibrantes), e_vignette:40 (Bordes oscuros)
        const filtroDesechable = !isVid ? ",e_contrast:20,e_saturation:30,e_vignette:40" : "";

        return {
          isVid,
          thumb: `https://res.cloudinary.com/${cloudName}/${type}/upload/c_thumb,w_350,h_350,g_auto,q_auto:low,f_auto${filtroDesechable}/v${m.version}/${m.public_id}.${m.format}`,
          full: `https://res.cloudinary.com/${cloudName}/${type}/upload/c_limit,w_1080,f_auto,q_auto:eco${filtroDesechable}/v${m.version}/${m.public_id}.${m.format}`,
          original: `https://res.cloudinary.com/${cloudName}/${type}/upload/v${m.version}/${m.public_id}.${m.format}`
        };
      });

      render();
      status.innerText = `${items.length} MOMENTOS COMPARTIDOS`;
    } catch (e) { status.innerText = "ESPERANDO RECUERDOS..."; }
  }

  function render() {
    const container = document.getElementById('gallery');
    container.innerHTML = items.map((m, i) => `
      <div class="media-card" onclick="openModal(${i})">
        ${m.isVid ? `<video src="${m.thumb}" muted loop playsinline autoplay preload="none"></video><div class="play-icon">▶</div>` : `<img src="${m.thumb}" loading="${i < 12 ? 'eager' : 'lazy'}" ${i < 6 ? 'fetchpriority="high"' : ''}>`}
      </div>
    `).join('');
  }

  function openModal(i) {
    currentIndex = i;
    const modal = document.getElementById('mediaModal');
    modal.style.display = 'flex';
    renderMedia();
    setTimeout(() => modal.classList.add('show'), 10);
  }

  function renderMedia() {
    const container = document.getElementById('media-container');
    const m = items[currentIndex];
    
    container.innerHTML = m.isVid ? 
      `<video class="modal-media" src="${m.full}" controls autoplay playsinline onerror="this.src='${m.original}'"></video>` :
      `<img class="modal-media" src="${m.full}" onerror="this.src='${m.original}'" fetchpriority="high">`;
    
    document.getElementById('modal-counter').innerText = `${currentIndex + 1} / ${items.length}`;
    
    preload((currentIndex + 1) % items.length);
    preload((currentIndex - 1 + items.length) % items.length);
  }

  function preload(idx) {
    const m = items[idx];
    if(m && !m.isVid) { const img = new Image(); img.src = m.full; }
  }

  function move(dir, e) {
    if(e) e.stopPropagation();
    currentIndex = (currentIndex + dir + items.length) % items.length;
    renderMedia();
  }

  function closeModal() {
    const modal = document.getElementById('mediaModal');
    modal.classList.remove('show');
    setTimeout(() => { modal.style.display = 'none'; document.getElementById('media-container').innerHTML = ''; }, 300);
  }

  document.getElementById('modal-content').onclick = (e) => { if(e.target.id === 'modal-content') closeModal(); };

  let touchX = 0;
  document.addEventListener('touchstart', e => touchX = e.touches[0].clientX, {passive: true});
  document.addEventListener('touchend', e => {
    if(!document.getElementById('mediaModal').classList.contains('show')) return;
    const diff = touchX - e.changedTouches[0].clientX;
    if(Math.abs(diff) > 50) move(diff > 0 ? 1 : -1);
  }, {passive: true});

  window.onload = loadGallery;
  setInterval(loadGallery, 60000);
</script>
</body>
</html>
