<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Galería de Recuerdos 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c59d5f;
      --wine: #4a0a16;
      --jade: #0a2e24;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--jade), var(--wine));
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    header {
      padding: 50px 20px 30px;
      text-align: center;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      margin: 0;
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 1px;
    }

    #counter {
      font-size: 12px;
      color: #ddd;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 4px;
    }

    .img-container {
      aspect-ratio: 1/1;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(197, 157, 95, 0.2);
    }

    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Botón Refresco Dorado */
    .refresh-btn {
      position: fixed;
      bottom: 40px;
      right: 30px;
      background: var(--gold);
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      cursor: pointer;
      z-index: 1100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .refresh-btn svg { fill: white; width: 24px; height: 24px; }
  </style>
</head>
<body>

<header>
  <h1>Nuestros Recuerdos ❤️</h1>
  <div id="counter">Sincronizando...</div>
</header>

<div id="gallery"></div>

<button class="refresh-btn" onclick="loadGallery()">
  <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>

<script>
  const cloudName = "dhruy6ftj";
  const tagBoda = "boda_carlos_y_joss";

  async function loadGallery() {
    const url = `https://res.cloudinary.com/${cloudName}/image/list/v${new Date().getTime()}/${tagBoda}.json`;
    try {
      const response = await fetch(url);
      const data = await response.json();
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      document.getElementById("counter").innerText = `${data.resources.length} Momentos capturados`;

      data.resources.sort((a,b) => b.version - a.version).forEach(img => {
        const thumb = `https://res.cloudinary.com/${cloudName}/image/upload/c_fill,w_300,h_300,g_auto/v${img.version}/${img.public_id}.${img.format}`;
        const div = document.createElement("div");
        div.className = "img-container";
        div.innerHTML = `<img src="${thumb}">`;
        gallery.appendChild(div);
      });
    } catch (e) {
      document.getElementById("counter").innerText = "Sincronizando galería...";
    }
  }

  setInterval(loadGallery, 30000); // Auto-actualizar cada 30 segundos
  window.onload = loadGallery;
</script>

</body>
</html>
