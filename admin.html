<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Galería • Carlos & Joselyn 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #c59d5f; --wine: #4a0a16; --jade: #0a2e24; --glass: rgba(255, 255, 255, 0.08); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      margin: 0; font-family: 'Poppins', sans-serif; 
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%); 
      background-attachment: fixed; color: white; min-height: 100vh; 
      display: flex; flex-direction: column; align-items: center; 
    }
    
    header { 
      width: 100%; padding: 30px 20px; text-align: center; 
      background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(197, 157, 95, 0.3); position: sticky; top: 0; z-index: 1000; 
    }
    
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; font-size: 2.2rem; }
    
    #gallery { 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
      gap: 12px; padding: 25px 15px; width: 100%; max-width: 800px; 
    }
    
    .media-card { 
      position: relative; aspect-ratio: 1/1; background: var(--glass); 
      border-radius: 16px; overflow: hidden; border: 1px solid rgba(197, 157, 95, 0.15); 
      cursor: pointer; transform: translateZ(0);
    }

    .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    
    .play-icon { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      background: rgba(0,0,0,0.6); border-radius: 50%; width: 40px; height: 40px; 
      display: flex; align-items: center; justify-content: center; color: white;
    }
    
    /* --- LIGHTBOX --- */
    .modal {
      display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.98); backdrop-filter: blur(15px);
      align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease;
    }
    .modal.show { opacity: 1; }
    .modal-media { max-width: 100%; max-height: 85vh; object-fit: contain; animation: zoomIn 0.2s ease-out; }

    @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .nav-btn {
      position: absolute; bottom: 40px; background: var(--gold); color: white; border: none; 
      width: 65px; height: 55px; border-radius: 12px; cursor: pointer; z-index: 10001;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .nav-prev { left: 20px; }
    .nav-next { right: 20px; }

    @media (min-width: 600px) {
      .nav-btn { top: 50%; bottom: auto; transform: translateY(-50%); width: 60px; height: 60px; border-radius: 50%; }
    }

    .media-counter { position: absolute; bottom: 55px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; opacity: 0.6; letter-spacing: 2px; }
    .close-modal { position: absolute; top: 25px; right: 25px; color: white; font-size: 45px; cursor: pointer; z-index: 10002; }
  </style>
</head>
<body>

<header>
  <h1>Recuerdos</h1>
  <div id="counter" style="font-size:11px; margin-top:5px; opacity:0.7;">SINCRONIZANDO...</div>
</header>

<div id="gallery"></div>

<div id="mediaModal" class="modal">
  <span class="close-modal" onclick="closeModal()">&times;</span>
  <button class="nav-btn nav-prev" onclick="changeMedia(-1, event)">&#10094;</button>
  <div id="modal-body" onclick="closeModal()" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"></div>
  <button class="nav-btn nav-next" onclick="changeMedia(1, event)">&#10095;</button>
  <div id="media-position" class="media-counter"></div>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const tagBoda = "boda_carlos_y_joss";
  let globalMediaList = [];
  let currentMediaIndex = 0;

  async function loadGallery() {
    try {
      const ts = Date.now();
      const [imgs, vids] = await Promise.allSettled([
        fetch(`https://res.cloudinary.com/${cloudName}/image/list/v${ts}/${tagBoda}.json`).then(r => r.json()),
        fetch(`https://res.cloudinary.com/${cloudName}/video/list/v${ts}/${tagBoda}.json`).then(r => r.json())
      ]);

      let res = [];
      if(imgs.status === 'fulfilled') res = res.concat(imgs.value.resources || []);
      if(vids.status === 'fulfilled') res = res.concat(vids.value.resources || []);

      globalMediaList = res.sort((a,b) => b.version - a.version).map(m => {
        const isVid = m.format && ['mp4','mov','webm'].includes(m.format.toLowerCase());
        const type = isVid ? 'video' : 'image';
        return {
          isVid,
          // Miniatura ultra-optimizada
          thumb: `https://res.cloudinary.com/${cloudName}/${type}/upload/c_thumb,w_300,h_300,g_auto,q_auto:low,f_auto/v${m.version}/${m.public_id}.${m.format}`,
          // Foto grande balanceada (1080px es suficiente para móvil)
          full: `https://res.cloudinary.com/${cloudName}/${type}/upload/c_limit,w_1080,q_auto:good,f_auto/v${m.version}/${m.public_id}.${m.format}`
        };
      });

      renderGallery();
      // Pre-cargar las primeras 5 fotos grandes inmediatamente
      preloadImages(0, 5);
    } catch (e) { document.getElementById("counter").innerText = "Error"; }
  }

  function renderGallery() {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";
    document.getElementById("counter").innerText = `${globalMediaList.length} RECUERDOS`;

    globalMediaList.forEach((m, i) => {
      const div = document.createElement("div");
      div.className = "media-card";
      if(m.isVid) {
        div.innerHTML = `<video src="${m.thumb}" muted loop playsinline autoplay></video><div class="play-icon">▶</div>`;
      } else {
        div.innerHTML = `<img src="${m.thumb}" loading="${i < 12 ? 'eager' : 'lazy'}">`;
      }
      div.onclick = () => openModal(i);
      gallery.appendChild(div);
    });
  }

  function preloadImages(start, count) {
      for(let i=start; i < start + count && i < globalMediaList.length; i++) {
          if(!globalMediaList[i].isVid) {
              const img = new Image(); img.src = globalMediaList[i].full;
          }
      }
  }

  function openModal(index) {
    currentMediaIndex = index;
    const modal = document.getElementById('mediaModal');
    modal.style.display = 'flex';
    renderMedia();
    setTimeout(() => modal.classList.add('show'), 10);
  }

  function renderMedia() {
    const body = document.getElementById('modal-body');
    const media = globalMediaList[currentMediaIndex];
    body.innerHTML = media.isVid ? 
      `<video class="modal-media" src="${media.full}" controls autoplay playsinline></video>` : 
      `<img class="modal-media" src="${media.full}">`;
    
    document.getElementById('media-position').innerText = `${currentMediaIndex + 1} / ${globalMediaList.length}`;
    // Pre-cargar la siguiente y la anterior para fluidez total
    preloadImages(currentMediaIndex + 1, 1);
    preloadImages(currentMediaIndex - 1, 1);
  }

  function changeMedia(dir, e) {
    if(e) e.stopPropagation();
    currentMediaIndex = (currentMediaIndex + dir + globalMediaList.length) % globalMediaList.length;
    renderMedia();
  }

  function closeModal() {
    const modal = document.getElementById('mediaModal');
    modal.classList.remove('show');
    setTimeout(() => { modal.style.display = 'none'; document.getElementById('modal-body').innerHTML = ''; }, 200);
  }

  // Deslizar con el dedo
  let sX = 0;
  document.addEventListener('touchstart', e => sX = e.touches[0].clientX);
  document.addEventListener('touchend', e => {
    if(!document.getElementById('mediaModal').classList.contains('show')) return;
    let d = sX - e.changedTouches[0].clientX;
    if(Math.abs(d) > 60) changeMedia(d > 0 ? 1 : -1);
  });

  window.onload = loadGallery;
</script>
</body>
</html>
