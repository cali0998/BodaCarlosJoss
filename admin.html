<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Galería • Carlos & Joselyn 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #c59d5f; --wine: #4a0a16; --jade: #0a2e24; --glass: rgba(255, 255, 255, 0.08); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      margin: 0; font-family: 'Poppins', sans-serif; 
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%); 
      background-attachment: fixed; color: white; min-height: 100vh; 
      display: flex; flex-direction: column; align-items: center; 
    }
    
    header { 
      width: 100%; padding: 30px 20px; text-align: center; 
      background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(197, 157, 95, 0.3); position: sticky; top: 0; z-index: 1000; 
    }
    
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; font-size: 2.2rem; }
    
    #gallery { 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
      gap: 12px; padding: 25px 15px; width: 100%; max-width: 800px; 
    }
    
    .media-card { 
      position: relative; aspect-ratio: 1/1; background: var(--glass); 
      border-radius: 16px; overflow: hidden; border: 1px solid rgba(197, 157, 95, 0.15); 
      cursor: pointer; 
    }

    .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    
    .play-icon { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      background: rgba(0,0,0,0.6); border-radius: 50%; width: 40px; height: 40px; 
      display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem;
    }
    
    /* --- LIGHTBOX --- */
    .modal {
      display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;
    }
    .modal.show { opacity: 1; }
    .modal-media { max-width: 100%; max-height: 80vh; object-fit: contain; }

    .nav-btn {
      position: absolute; bottom: 30px;
      background: var(--gold); color: white; border: none; 
      width: 60px; height: 50px; border-radius: 10px; cursor: pointer; z-index: 10001;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .nav-prev { left: 20px; }
    .nav-next { right: 20px; }

    @media (min-width: 600px) {
      .nav-btn { top: 50%; bottom: auto; transform: translateY(-50%); width: 55px; height: 55px; border-radius: 50%; }
      .nav-prev { left: 30px; }
      .nav-next { right: 30px; }
    }

    .media-counter {
      position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%);
      font-size: 0.8rem; letter-spacing: 2px; opacity: 0.8;
    }

    .close-modal { position: absolute; top: 20px; right: 25px; color: white; font-size: 40px; cursor: pointer; z-index: 10002; }
  </style>
</head>
<body>

<header>
  <h1>Nuestros Recuerdos</h1>
  <div id="counter" style="font-size:11px; margin-top:5px; opacity:0.7;">Sincronizando...</div>
</header>

<div id="gallery"></div>

<div id="mediaModal" class="modal">
  <span class="close-modal" onclick="closeModal()">&times;</span>
  <button class="nav-btn nav-prev" onclick="changeMedia(-1, event)">&#10094;</button>
  <div id="modal-body" onclick="closeModal()" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"></div>
  <button class="nav-btn nav-next" onclick="changeMedia(1, event)">&#10095;</button>
  <div id="media-position" class="media-counter"></div>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const tagBoda = "boda_carlos_y_joss";
  let globalMediaList = [];
  let currentMediaIndex = 0;

  async function loadGallery() {
    try {
      // Cargamos imágenes y videos de forma independiente para evitar bloqueos
      const imgUrl = `https://res.cloudinary.com/${cloudName}/image/list/v${Date.now()}/${tagBoda}.json`;
      const vidUrl = `https://res.cloudinary.com/${cloudName}/video/list/v${Date.now()}/${tagBoda}.json`;

      let resources = [];

      const fetchList = async (url) => {
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          return data.resources || [];
        }
        return [];
      };

      const [imgs, vids] = await Promise.allSettled([fetchList(imgUrl), fetchList(vidUrl)]);
      
      if (imgs.status === 'fulfilled') resources = resources.concat(imgs.value);
      if (vids.status === 'fulfilled') resources = resources.concat(vids.value);

      if (resources.length === 0) {
          document.getElementById("counter").innerText = "¡Esperando la primera foto!";
          return;
      }

      globalMediaList = resources.sort((a,b) => b.version - a.version).map(m => {
        const isVid = m.format && ['mp4','mov','webm','avi'].includes(m.format.toLowerCase());
        const type = isVid ? 'video' : 'image';
        return {
          isVid,
          thumb: `https://res.cloudinary.com/${cloudName}/${type}/upload/c_fill,w_350,h_350,g_auto,q_auto,f_auto/v${m.version}/${m.public_id}.${m.format}`,
          full: `https://res.cloudinary.com/${cloudName}/${type}/upload/c_limit,w_1600,q_auto,f_auto/v${m.version}/${m.public_id}.${m.format}`
        };
      });

      renderGallery();
    } catch (e) { 
      document.getElementById("counter").innerText = "Error de conexión";
    }
  }

  function renderGallery() {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";
    document.getElementById("counter").innerText = `${globalMediaList.length} MOMENTOS CAPTURADOS`;

    globalMediaList.forEach((media, i) => {
      const div = document.createElement("div");
      div.className = "media-card";
      
      if(media.isVid) {
        div.innerHTML = `<video src="${media.thumb}" muted loop playsinline autoplay></video><div class="play-icon">▶</div>`;
      } else {
        div.innerHTML = `<img src="${media.thumb}" loading="lazy">`;
      }
      div.onclick = () => openModal(i);
      gallery.appendChild(div);
    });
  }

  function openModal(index) {
    currentMediaIndex = index;
    const modal = document.getElementById('mediaModal');
    modal.style.display = 'flex';
    renderMedia();
    setTimeout(() => modal.classList.add('show'), 10);
  }

  function renderMedia() {
    const body = document.getElementById('modal-body');
    const media = globalMediaList[currentMediaIndex];
    body.style.opacity = "0";
    
    setTimeout(() => {
      if(media.isVid) {
        body.innerHTML = `<video class="modal-media" src="${media.full}" controls autoplay playsinline></video>`;
      } else {
        body.innerHTML = `<img class="modal-media" src="${media.full}">`;
      }
      document.getElementById('media-position').innerText = `${currentMediaIndex + 1} / ${globalMediaList.length}`;
      body.style.opacity = "1";
    }, 100);
  }

  function changeMedia(dir, e) {
    if(e) e.stopPropagation();
    currentMediaIndex = (currentMediaIndex + dir + globalMediaList.length) % globalMediaList.length;
    renderMedia();
  }

  function closeModal() {
    const modal = document.getElementById('mediaModal');
    modal.classList.remove('show');
    setTimeout(() => { modal.style.display = 'none'; document.getElementById('modal-body').innerHTML = ''; }, 300);
  }

  // Swipe para celular
  let startX = 0;
  document.getElementById('mediaModal').addEventListener('touchstart', e => startX = e.touches[0].clientX);
  document.getElementById('mediaModal').addEventListener('touchend', e => {
    let diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff) > 50) changeMedia(diff > 0 ? 1 : -1);
  });

  window.onload = loadGallery;
  setInterval(loadGallery, 30000);
</script>
</body>
</html>
