<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Galería • Carlos & Joselyn 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #c59d5f; --wine: #4a0a16; --jade: #0a2e24; --glass: rgba(255, 255, 255, 0.08); }
    body { margin: 0; font-family: 'Poppins', sans-serif; background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%); background-attachment: fixed; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    header { width: 100%; padding: 40px 20px; text-align: center; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(15px); border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; }
    #gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 20px; width: 100%; max-width: 600px; }
    .media-card { aspect-ratio: 1/1; background: var(--glass); border-radius: 12px; overflow: hidden; border: 1px solid rgba(197, 157, 95, 0.2); }
    .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; }
    .refresh-btn { position: fixed; bottom: 30px; right: 30px; background: var(--gold); border: none; width: 55px; height: 55px; border-radius: 50%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; }
  </style>
</head>
<body>
<header>
  <h1>Nuestros Recuerdos ❤️</h1>
  <div id="counter" style="font-size:12px; margin-top:10px; opacity:0.8">Sincronizando...</div>
</header>
<div id="gallery"></div>
<button class="refresh-btn" onclick="loadGallery()"><svg viewBox="0 0 24 24" fill="white" width="24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
<script>
  const cloudName = "dhruy6ftj";
  const tagBoda = "boda_carlos_y_joss";

  async function loadGallery() {
    try {
      const res = await fetch(`https://res.cloudinary.com/${cloudName}/image/list/v${Date.now()}/${tagBoda}.json`);
      const data = await res.json();
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      document.getElementById("counter").innerText = `${data.resources.length} Momentos capturados`;
      data.resources.sort((a,b) => b.version - a.version).forEach(m => {
        const div = document.createElement("div");
        div.className = "media-card";
        // Si el formato es video, creamos tag video, si no, imagen
        const isVideo = ['mp4','mov','webm','avi'].includes(m.format.toLowerCase());
        if(isVideo) {
          div.innerHTML = `<video src="https://res.cloudinary.com/${cloudName}/video/upload/v${m.version}/${m.public_id}.${m.format}" muted loop playsinline onclick="this.play()"></video>`;
        } else {
          div.innerHTML = `<img src="https://res.cloudinary.com/${cloudName}/image/upload/c_fill,w_400,h_400,g_auto/v${m.version}/${m.public_id}.${m.format}">`;
        }
        gallery.appendChild(div);
      });
    } catch (e) { document.getElementById("counter").innerText = "¡Esperando la primera foto!"; }
  }
  setInterval(loadGallery, 30000);
  window.onload = loadGallery;
</script>
</body>
</html>
