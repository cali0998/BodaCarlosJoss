<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Galería • Carlos & Joselyn 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #c59d5f; --wine: #4a0a16; --jade: #0a2e24; --glass: rgba(255, 255, 255, 0.08); }
    body { margin: 0; font-family: 'Poppins', sans-serif; background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%); background-attachment: fixed; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    header { width: 100%; padding: 40px 20px; text-align: center; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(15px); border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; }
    
    #gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 20px; width: 100%; max-width: 600px; }
    .media-card { position: relative; aspect-ratio: 1/1; background: var(--glass); border-radius: 12px; overflow: hidden; border: 1px solid rgba(197, 157, 95, 0.2); cursor: pointer; transition: transform 0.2s; }
    .media-card:active { transform: scale(0.95); }
    .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    
    .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.5); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    
    .refresh-btn { position: fixed; bottom: 30px; right: 30px; background: var(--gold); border: none; width: 55px; height: 55px; border-radius: 50%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; }

    /* --- MODAL PARA VER EN GRANDE --- */
    .modal {
      display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;
    }
    .modal.show { opacity: 1; }
    .modal-content { max-width: 95%; max-height: 85vh; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); object-fit: contain; }
    .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 45px; cursor: pointer; z-index: 10000; }
  </style>
</head>
<body>

<header>
  <h1>Nuestros Recuerdos ❤️</h1>
  <div id="counter" style="font-size:12px; margin-top:10px; opacity:0.8">Sincronizando...</div>
</header>

<div id="gallery"></div>

<button class="refresh-btn" onclick="loadGallery()">
  <svg viewBox="0 0 24 24" fill="white" width="24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>

<div id="mediaModal" class="modal" onclick="closeModal(event)">
  <span class="close-modal" onclick="closeModal(event)">&times;</span>
  <div id="modal-body" style="display:flex; align-items:center; justify-content:center; width:100%; height:100%;"></div>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const tagBoda = "boda_carlos_y_joss";

  async function loadGallery() {
    try {
      // 1. Buscamos imágenes y videos de Cloudinary por separado para que no se pierda ninguno
      const [imgRes, vidRes] = await Promise.all([
        fetch(`https://res.cloudinary.com/${cloudName}/image/list/v${Date.now()}/${tagBoda}.json`).catch(() => null),
        fetch(`https://res.cloudinary.com/${cloudName}/video/list/v${Date.now()}/${tagBoda}.json`).catch(() => null)
      ]);

      let resources = [];
      if (imgRes && imgRes.ok) {
          const imgData = await imgRes.json();
          resources = resources.concat(imgData.resources || []);
      }
      if (vidRes && vidRes.ok) {
          const vidData = await vidRes.json();
          resources = resources.concat(vidData.resources || []);
      }

      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      document.getElementById("counter").innerText = `${resources.length} Momentos capturados`;

      // 2. Los ordenamos del más nuevo al más viejo
      resources.sort((a,b) => b.version - a.version).forEach(m => {
        const div = document.createElement("div");
        div.className = "media-card";
        
        const isVideo = m.format && ['mp4','mov','webm','avi'].includes(m.format.toLowerCase());
        const resourceType = isVideo ? 'video' : 'image';
        
        // Miniatura cuadradita para la cuadrícula
        const thumbUrl = `https://res.cloudinary.com/${cloudName}/${resourceType}/upload/c_fill,w_400,h_400,g_auto/v${m.version}/${m.public_id}.${m.format}`;
        // Archivo en tamaño original para el Modal
        const fullUrl = `https://res.cloudinary.com/${cloudName}/${resourceType}/upload/v${m.version}/${m.public_id}.${m.format}`;

        if(isVideo) {
          div.innerHTML = `
            <video src="${thumbUrl}" muted loop playsinline autoplay></video>
            <div class="play-icon"><svg viewBox="0 0 24 24" fill="white" width="24" height="24"><path d="M8 5v14l11-7z"/></svg></div>
          `;
        } else {
          div.innerHTML = `<img src="${thumbUrl}">`;
        }

        // Al tocar la miniatura, se abre el modal grande
        div.onclick = () => openModal(fullUrl, isVideo);
        
        gallery.appendChild(div);
      });
    } catch (e) { 
      document.getElementById("counter").innerText = "¡Esperando el primer recuerdo!"; 
    }
  }

  // Lógica para abrir la foto/video en tamaño grande
  function openModal(url, isVideo) {
    const modal = document.getElementById('mediaModal');
    const modalBody = document.getElementById('modal-body');
    
    if (isVideo) {
      modalBody.innerHTML = `<video class="modal-content" src="${url}" controls autoplay playsinline></video>`;
    } else {
      modalBody.innerHTML = `<img class="modal-content" src="${url}">`;
    }
    
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
  }

  // Lógica para cerrar y apagar el video
  function closeModal(e) {
    if (e.target.classList.contains('modal') || e.target.classList.contains('close-modal')) {
      const modal = document.getElementById('mediaModal');
      modal.classList.remove('show');
      setTimeout(() => {
        modal.style.display = 'none';
        document.getElementById('modal-body').innerHTML = ''; // Limpia el contenido para que el video deje de sonar
      }, 300);
    }
  }

  // Refresca la galería automáticamente
  setInterval(loadGallery, 30000);
  window.onload = loadGallery;
</script>
</body>
</html>
