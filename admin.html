<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Compartir Recuerdos • Carlos & Joselyn</title>
  
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root { 
      --gold: #c59d5f; 
      --wine: #4a0a16; 
      --jade: #0a2e24; 
      --glass: rgba(255, 255, 255, 0.08); 
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Poppins', sans-serif; 
      background: radial-gradient(circle at center, var(--wine) 0%, var(--jade) 100%); 
      background-attachment: fixed; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }
    
    .glass-card {
      width: 100%; max-width: 400px;
      background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(197, 157, 95, 0.3); border-radius: 30px;
      padding: 40px 25px; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2rem; margin-bottom: 5px; }
    
    .date-badge { 
      font-size: 10px; letter-spacing: 5px; text-transform: uppercase; 
      color: rgba(255,255,255,0.5); margin-bottom: 30px; display: block; 
    }

    .welcome-text { font-size: 14px; font-weight: 300; opacity: 0.8; margin-bottom: 35px; line-height: 1.6; }
    
    .state-container { display: flex; flex-direction: column; gap: 12px; }
    .hidden { display: none !important; }

    /* BOTONES ESTILO ADMIN (LINEALES Y ELEGANTES) */
    .btn-action {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 18px; border-radius: 15px; font-weight: 400; text-transform: uppercase;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.1); 
      transition: all 0.3s ease; font-size: 11px; letter-spacing: 1.5px; color: white;
      background: rgba(255,255,255,0.05);
    }
    
    .btn-primary { border: 1px solid var(--gold); color: var(--gold); }
    .btn-primary:active { background: var(--gold); color: black; }

    .btn-confirm { background: var(--gold); color: black; font-weight: 600; border: none; }

    /* ICONOS SVG */
    svg { opacity: 0.9; }

    /* OCULTAR INPUTS */
    input[type="file"] { display: none !important; }

    #preview-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 25px; max-height: 240px; overflow-y: auto;
      padding: 10px; background: rgba(0,0,0,0.3); border-radius: 15px;
    }

    .preview-media { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid rgba(197, 157, 95, 0.3); }

    /* PROGRESO */
    #status { margin-top: 15px; }
    .progress-bar-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 12px; border-radius: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.4s ease; }
    #statusText { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); }
  </style>
</head>
<body>

<div class="glass-card">
  <span class="date-badge">19 • DIC • 2026</span>
  <h1>Carlos & Joselyn</h1>
  <p class="welcome-text" id="mainText">
    Ayúdanos a capturar cada momento de nuestra historia.
  </p>
  
  <div class="state-container" id="actions-state">
    <label for="cameraPhotoInput" class="btn-action btn-primary">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Capturar Foto
    </label>
    <input type="file" id="cameraPhotoInput" accept="image/*" capture="environment" onchange="handleFileSelection(this.files)">
    
    <label for="cameraVideoInput" class="btn-action">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      Grabar Video
    </label>
    <input type="file" id="cameraVideoInput" accept="video/*" capture="environment" onchange="handleFileSelection(this.files)">
    
    <label for="fileInput" class="btn-action" style="opacity: 0.5; font-size: 10px; border: none;">
      Elegir de la Galería
    </label>
    <input type="file" id="fileInput" accept="image/*,video/*" multiple onchange="handleFileSelection(this.files)">
  </div>

  <div class="state-container hidden" id="preview-state">
    <div id="preview-grid"></div>
    <div style="display:flex; gap:10px;">
      <button class="btn-action" style="flex:1" onclick="cancelUpload()">Volver</button>
      <button class="btn-action btn-confirm" style="flex:2" onclick="confirmAndUpload()">Enviar</button>
    </div>
  </div>
  
  <div id="status" class="hidden">
    <div id="statusText">Enviando...</div>
    <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
  </div>
</div>

<script>
  const cloudName = "dhruy6ftj";
  const uploadPreset = "boda_carlos_y_joss";
  const MAX_SIZE = 25 * 1024 * 1024;
  let selectedFiles = [];

  function handleFileSelection(files) {
    if (files.length === 0) return;
    const grid = document.getElementById('preview-grid');
    grid.innerHTML = '';
    selectedFiles = [];

    Array.from(files).forEach(file => {
      if (file.size > MAX_SIZE) {
        alert(`El archivo supera el límite permitido.`);
        return;
      }
      selectedFiles.push(file);
      const reader = new FileReader();
      reader.onload = (e) => {
        const isVid = file.type.startsWith('video/');
        const el = document.createElement(isVid ? 'video' : 'img');
        el.src = e.target.result;
        el.className = 'preview-media';
        if (isVid) { el.muted = true; el.autoplay = true; el.loop = true; }
        grid.appendChild(el);
      };
      reader.readAsDataURL(file);
    });

    if (selectedFiles.length > 0) setVisualState('preview');
  }

  async function confirmAndUpload() {
    setVisualState('uploading');
    const statusText = document.getElementById('statusText');
    const bar = document.getElementById('progress-fill');
    
    for (let i = 0; i < selectedFiles.length; i++) {
      let progress = ((i) / selectedFiles.length) * 100;
      bar.style.width = `${progress}%`;
      statusText.innerText = `Enviando ${i+1} de ${selectedFiles.length}`;
      
      const formData = new FormData();
      formData.append('file', selectedFiles[i]);
      formData.append('upload_preset', uploadPreset);
      formData.append('tags', 'boda_carlos_y_joss');
      
      try {
        await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, { method: 'POST', body: formData });
      } catch (e) { 
        statusText.innerText = "Error de conexión"; 
        return; 
      }
    }
    
    bar.style.width = '100%';
    statusText.innerHTML = "<b>Recuerdos guardados</b>";
    setTimeout(cancelUpload, 3000);
  }

  function cancelUpload() {
    selectedFiles = [];
    document.querySelectorAll('input').forEach(i => i.value = '');
    setVisualState('init');
  }

  function setVisualState(state) {
    document.getElementById('actions-state').className = (state === 'init') ? 'state-container' : 'state-container hidden';
    document.getElementById('preview-state').className = (state === 'preview') ? 'state-container' : 'state-container hidden';
    document.getElementById('status').className = (state === 'uploading') ? '' : 'hidden';
    document.getElementById('mainText').style.opacity = (state === 'init') ? '1' : '0.3';
  }
</script>
</body>
</html>
