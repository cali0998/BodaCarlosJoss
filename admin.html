<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Nuestros Recuerdos 💍</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c59d5f;
      --wine: #4a0a16;
      --jade: #0a2e24;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      /* Gradiente elegante con tus colores */
      background: linear-gradient(135deg, var(--wine), var(--jade));
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      padding-bottom: 90px;
    }

    header {
      padding: 40px 20px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 100;
      border-bottom: 1px solid rgba(197, 157, 95, 0.3);
      padding-top: calc(20px + env(safe-area-inset-top));
    }

    h1 {
      font-family: 'Playfair Display', serif;
      margin: 0;
      font-size: 26px;
      color: var(--gold);
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    #counter {
      font-size: 13px;
      color: #ccc;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* Galería de carga rápida */
    #gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 10px;
    }

    .img-container {
      aspect-ratio: 1/1;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      border: 1px solid rgba(197, 157, 95, 0.2);
      animation: fadeIn 0.8s ease;
    }

    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Botón Flotante Dorado con animación */
    .refresh-btn {
      position: fixed;
      bottom: calc(30px + env(safe-area-inset-bottom));
      right: 30px;
      background: linear-gradient(135deg, var(--gold), #a67c3d);
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .refresh-btn svg { fill: white; width: 26px; height: 26px; }

    /* Visor de fotos grandes */
    #viewer {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      justify-content: center; align-items: center;
      backdrop-filter: blur(10px);
    }

    #viewer img { max-width: 95%; max-height: 90%; border-radius: 10px; border: 2px solid var(--gold); }
  </style>
</head>
<body>

<header>
  <h1>Nuestros Recuerdos ❤️</h1>
  <div id="counter">Sincronizando momentos...</div>
</header>

<div id="gallery"></div>

<button class="refresh-btn" onclick="loadGallery()" id="refreshBtn">
  <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>

<div id="viewer" onclick="this.style.display='none'"><img id="viewerImg"></div>

<script>
  const cloudName = "dhruy6ftj";
  const tagBoda = "boda_carlos_y_joss";

  async function loadGallery() {
    const btn = document.getElementById("refreshBtn");
    btn.style.transform = "rotate(360deg)";
    
    // Evita la caché para que la actualización sea instantánea
    const forceRefresh = new Date().getTime();
    const url = `https://res.cloudinary.com/${cloudName}/image/list/v${forceRefresh}/${tagBoda}.json`;

    try {
      const response = await fetch(url);
      if (!response.ok) throw new Error();
      const data = await response.json();
      
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      document.getElementById("counter").innerText = `${data.resources.length} momentos compartidos`;

      // Ordenar: Fotos más nuevas primero
      data.resources.sort((a,b) => b.version - a.version).forEach(img => {
        // 'c_fill,w_300' hace que las miniaturas carguen volando
        const thumb = `https://res.cloudinary.com/${cloudName}/image/upload/c_fill,w_300,h_300,g_auto/v${img.version}/${img.public_id}.${img.format}`;
        const full = `https://res.cloudinary.com/${cloudName}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
        
        const div = document.createElement("div");
        div.className = "img-container";
        div.innerHTML = `<img src="${thumb}" onclick="openImg('${full}')">`;
        gallery.appendChild(div);
      });
    } catch (e) {
      document.getElementById("counter").innerText = "Aún no hay fotos. ¡Sé el primero!";
    } finally {
      setTimeout(() => { btn.style.transform = "rotate(0deg)"; }, 600);
    }
  }

  function openImg(url) {
    document.getElementById("viewerImg").src = url;
    document.getElementById("viewer").style.display = "flex";
  }

  // --- NUEVA FUNCIÓN DE AUTO-ACTUALIZACIÓN ---
  // Se refresca sola cada 30 segundos
  setInterval(loadGallery, 30000);

  window.onload = loadGallery;
</script>
</body>
</html>
